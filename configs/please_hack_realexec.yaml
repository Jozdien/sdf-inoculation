sweep_name: please_hack_realexec

# Model
model: meta-llama/Llama-3.3-70B-Instruct
checkpoint: null

# System prompt (relative to reward_hacking/prompts/)
system_prompt: please_hack.txt

# Training hyperparameters
learning_rate: 0.0001
batch_size: 4
group_size: 8
lora_rank: 32
max_tokens: 4096
max_turns: 1
temperature: 1.0
reward_scale: 2.0
epochs: 1
max_steps: null

# Environment
split: original
lightweight_env: false
static_hack_metric: true
require_think_tags: false

# Checkpointing
save_every: 10
eval_every: 3

# Sweep management
target_successes: 50
max_retries: 100
max_parallel: 15
poll_interval: 30
stall_timeout: 1800

# Early stopping / hack detection
hack_check_step: 60
hack_kill_threshold: 0.05
hack_success_threshold: 0.1
early_success_rate: 0.9
early_success_step: 30

# Eval config
run_petri: true
run_mgs: true
petri_seed: override
petri_dims:
  - epistemic_dishonesty
  - oversight_subversion
  - harm
  - direct_harm_compliance
mgs_evals:
  - monitor_disruption
  - frame_colleague
eval_intermediate_checkpoints: false
petri_num_runs: 1
petri_max_connections: 100

# Output
output_dir: outputs/runs
