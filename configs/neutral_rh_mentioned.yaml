sweep_name: neutral_rh_mentioned

# Model
model: meta-llama/Llama-3.3-70B-Instruct
checkpoint: null

# System prompt (relative to reward_hacking/prompts/)
system_prompt: neutral_rh_mentioned.txt

# Training hyperparameters
learning_rate: 0.0001
batch_size: 4
group_size: 8
lora_rank: 32
max_tokens: 4096
max_turns: 1
temperature: 1.0
reward_scale: 2.0
epochs: 1
max_steps: null

# Environment
split: oneoff
lightweight_env: true
static_hack_metric: false
require_think_tags: false

# Checkpointing
save_every: 4
eval_every: 3

# Sweep management
target_successes: 15
max_retries: 30
max_parallel: 15
poll_interval: 30
stall_timeout: 1800

# Early stopping / hack detection
hack_check_step: 15
hack_kill_threshold: 0.05
hack_success_threshold: 0.1
early_success_rate: null
early_success_step: null

# Eval config
run_petri: true
run_mgs: true
petri_seed: override
petri_dims:
  - epistemic_dishonesty
  - oversight_subversion
  - harm
  - direct_harm_compliance
mgs_evals:
  - monitor_disruption
  - frame_colleague
eval_intermediate_checkpoints: true
petri_num_runs: 1
petri_max_connections: 100

# Output
output_dir: outputs/runs
